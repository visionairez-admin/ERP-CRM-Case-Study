services:
  - type: web
    name: erp-crm-backend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build --workspace=backend && npm run prisma:migrate -- --name deploy
    startCommand: npm start --workspace=backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: erp-crm-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://your-vercel-frontend-url.vercel.app
      - key: PORT
        value: 5000

databases:
  - name: erp-crm-db
    plan: starter
    ipAllowList: []
